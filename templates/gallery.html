<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}}{{if .CurrentPath}} - {{.CurrentPath}}{{end}}</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar">
  <nav class="breadcrumbs">
    <a href="/browse/" class="crumb">{{.Title}}</a>
    {{range .Breadcrumbs}}
    <span class="sep">/</span><a href="/browse/{{.Path}}" class="crumb">{{.Name}}</a>
    {{end}}
  </nav>
</header>
<main class="gallery" style="--img-h: {{.ImageHeight}}px">
  {{if .Items}}
  {{range .Items}}
  <div class="item{{if .IsDir}} isdir{{end}}" style="--ar: {{printf "%.4f" .AspectRatio}}">
    <a href="{{if .IsDir}}/browse/{{.Path}}{{else}}/content/{{.Path}}{{end}}" class="link">
      {{if .IsDir}}
      <div class="folder">
        <svg viewBox="0 0 24 24" class="folder-icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span class="folder-name">{{.Name}}</span>
      </div>
      {{else}}
      <img src="/thumbnail/{{.Path}}" alt="{{.Name}}" loading="lazy" class="thumb">
      {{end}}
    </a>
  </div>
  {{end}}
  <div class="spacer"></div>
  {{else}}
  <div class="empty">This directory is empty.</div>
  {{end}}
</main>
</body>
</html>
