<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}}{{if .CurrentPath}} - {{.CurrentPath}}{{end}}</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar">
  <nav class="breadcrumbs">
    <a href="/browse/" class="crumb">{{.Title}}</a>
    {{range .Breadcrumbs}}
    <span class="sep">/</span><a href="/browse/{{.Path}}" class="crumb">{{.Name}}</a>
    {{end}}
  </nav>
</header>
<main class="gallery" style="--img-h: {{.ImageHeight}}px">
  {{if .Items}}
  {{range .Items}}
  <div class="item{{if .IsDir}} isdir{{end}}" style="--ar: {{printf "%.4f" .AspectRatio}}">
    <a href="{{if .IsDir}}/browse/{{.Path}}{{else}}/content/{{.Path}}{{end}}" class="link">
      {{if .IsDir}}
      <div class="folder">
        <img src="/thumbnail/{{.Path}}" alt="{{.Name}}" loading="lazy" class="folder-thumb">
        <span class="folder-name">{{.Name}}</span>
      </div>
      {{else}}
      <img src="/thumbnail/{{.Path}}" alt="{{.Name}}" loading="lazy" class="thumb">
      {{end}}
    </a>
  </div>
  {{end}}
  <div class="spacer"></div>
  {{if .HasMore}}<div id="scroll-sentinel" class="sentinel"><div class="spinner"></div></div>{{end}}
  {{else}}
  <div class="empty">This directory is empty.</div>
  {{end}}
</main>
<script>
(function(){
var page = 1;
var pageSize = {{.PageSize}};
var path = {{printf "%q" .CurrentPath}};
var hasMore = {{.HasMore}};
var loading = false;
var sentinel = document.getElementById('scroll-sentinel');
if (!sentinel) return;
var observer = new IntersectionObserver(async function(entries) {
  if (!entries[0].isIntersecting || !hasMore || loading) return;
  loading = true;
  page++;
  try {
    var res = await fetch('/browse/' + path + '?page=' + page);
    var data = await res.json();
    hasMore = data.hasMore;
    var frag = document.createDocumentFragment();
    data.items.forEach(function(item) {
      var div = document.createElement('div');
      div.className = 'item' + (item.isDir ? ' isdir' : '');
      div.style.setProperty('--ar', item.aspectRatio.toFixed(4));
      var a = document.createElement('a');
      a.className = 'link';
      a.href = item.isDir ? '/browse/' + item.path : '/content/' + item.path;
      if (item.isDir) {
        var folder = document.createElement('div');
        folder.className = 'folder';
        var img = document.createElement('img');
        img.src = '/thumbnail/' + item.path;
        img.alt = item.name;
        img.loading = 'lazy';
        img.className = 'folder-thumb';
        folder.appendChild(img);
        var span = document.createElement('span');
        span.className = 'folder-name';
        span.textContent = item.name;
        folder.appendChild(span);
        a.appendChild(folder);
      } else {
        var img = document.createElement('img');
        img.src = '/thumbnail/' + item.path;
        img.alt = item.name;
        img.loading = 'lazy';
        img.className = 'thumb';
        a.appendChild(img);
      }
      div.appendChild(a);
      frag.appendChild(div);
    });
    var spacer = document.querySelector('.spacer');
    if (spacer) sentinel.parentNode.insertBefore(frag, spacer);
    else sentinel.parentNode.insertBefore(frag, sentinel);
    if (hasMore) {
      sentinel.style.display = '';
    } else {
      sentinel.remove();
      observer.disconnect();
    }
  } catch(e) {
    console.error('gallery pagination:', e);
  }
  loading = false;
});
observer.observe(sentinel);
})();
</script>
</body>
</html>
