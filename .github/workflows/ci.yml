name: CI

on:
  push:
    branches: [go]
  pull_request:
    branches: [go]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null .

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/go'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/alanaktion/gallery:go
